name: Deploy ON Push

on:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Codebase
        uses: actions/checkout@v6
      - name: Check if file exist
        run: |
          ls -la
      - name: Setup npm
        uses: actions/setup-node@v6
        with:
          node-version: "24"
